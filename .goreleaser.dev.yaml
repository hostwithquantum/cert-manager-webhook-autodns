---
version: 2
before:
  hooks:
    - go mod tidy
builds:
  - id: webhook
    binary: webhook
    env:
      - CGO_ENABLED=0
    ldflags: '-w -extldflags "-static"'
    goos:
      - linux
    goarch:
      - amd64
archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
dockers_v2:
  - images:
      - 'r.planetary-quantum.com/runway-public/cert-manager-webhook-autodns'
    ids:
      - webhook
    dockerfile: Dockerfile
    tags:
      - "{{ .Tag }}"
    flags:
      - "--pull"
    labels:
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
    platforms:
      - linux/amd64
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
